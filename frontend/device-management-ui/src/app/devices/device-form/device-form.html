<h2 mat-dialog-title>
  {{ mode === 'create' ? 'Add Device' :
     mode === 'edit' ? 'Edit Device' : 'Device Details' }}
</h2>

<mat-dialog-content [formGroup]="form">

  <div *ngIf="form.invalid && form.touched" style="color: red; margin-bottom: 10px;">
    Please fill all required fields before saving.
  </div>

  <mat-form-field appearance="fill">
    <input matInput placeholder="Name" formControlName="name">
    <mat-error *ngIf="form.controls.name.invalid && form.controls.name.touched">
      Name is required
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <input matInput placeholder="Manufacturer" formControlName="manufacturer">
    <mat-error *ngIf="form.controls.manufacturer.invalid && form.controls.manufacturer.touched">
      Manufacturer is required
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <input matInput placeholder="Type" formControlName="type">
    <mat-error *ngIf="form.controls.type.invalid && form.controls.type.touched">
      Type is required
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <input matInput placeholder="OS" formControlName="os">
    <mat-error *ngIf="form.controls.os.invalid && form.controls.os.touched">
      OS is required
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <input matInput placeholder="OS Version" formControlName="osVersion">
    <mat-error *ngIf="form.controls.osVersion.invalid && form.controls.osVersion.touched">
      OS Version is required
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <input matInput placeholder="Processor" formControlName="processor">
    <mat-error *ngIf="form.controls.processor.invalid && form.controls.processor.touched">
      Processor is required
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <input matInput placeholder="RAM" formControlName="ram">
    <mat-error *ngIf="form.controls.ram.invalid && form.controls.ram.touched">
      RAM is required
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <textarea matInput placeholder="Description" formControlName="description"></textarea>
    <button
      mat-button
      matSuffix
      type="button"
      (click)="generateAiDescription()"
      [disabled]="!canGenerateAi()"
    >
      Generate AI
    </button>
    <mat-error *ngIf="form.controls.description.invalid && form.controls.description.touched">
      Description is required
    </mat-error>
  </mat-form-field>

</mat-dialog-content>

<mat-dialog-actions align="end">

  <button mat-button (click)="close()">Cancel</button>

  <button mat-raised-button color="primary"
          *ngIf="mode !== 'view'"
          (click)="submit()">
    Save
  </button>

</mat-dialog-actions>
