<h2 mat-dialog-title class="dialog-title">
  {{ mode === 'create' ? 'Add Device' :
     mode === 'edit' ? 'Edit Device' : 'Device Details' }}
</h2>

<mat-dialog-content [formGroup]="form" class="dialog-content">

  <div *ngIf="form.invalid && form.touched" class="form-error">
    Please fill all required fields before saving.
  </div>

  <div class="form-grid">

    <!-- Name -->
    <div class="form-row">
      <label class="field-label">Name <span class="required">*</span></label>
      <div class="field-control">
        <mat-form-field appearance="outline">
          <input matInput formControlName="name">
          <mat-error *ngIf="form.controls.name.invalid && form.controls.name.touched">
            Name is required
          </mat-error>
        </mat-form-field>
      </div>
    </div>

    <!-- Manufacturer -->
    <div class="form-row">
      <label class="field-label">Manufacturer <span class="required">*</span></label>
      <div class="field-control">
        <mat-form-field appearance="outline">
          <input matInput formControlName="manufacturer">
          <mat-error *ngIf="form.controls.manufacturer.invalid && form.controls.manufacturer.touched">
            Manufacturer is required
          </mat-error>
        </mat-form-field>
      </div>
    </div>

    <!-- Type -->
    <div class="form-row">
      <label class="field-label">Type <span class="required">*</span></label>
      <div class="field-control">
        <mat-form-field appearance="outline">
          <input matInput formControlName="type">
          <mat-error *ngIf="form.controls.type.invalid && form.controls.type.touched">
            Type is required
          </mat-error>
        </mat-form-field>
      </div>
    </div>

    <!-- OS -->
    <div class="form-row">
      <label class="field-label">OS <span class="required">*</span></label>
      <div class="field-control">
        <mat-form-field appearance="outline">
          <input matInput formControlName="os">
          <mat-error *ngIf="form.controls.os.invalid && form.controls.os.touched">
            OS is required
          </mat-error>
        </mat-form-field>
      </div>
    </div>

    <!-- OS Version -->
    <div class="form-row">
      <label class="field-label">OS Version <span class="required">*</span></label>
      <div class="field-control">
        <mat-form-field appearance="outline">
          <input matInput formControlName="osVersion">
          <mat-error *ngIf="form.controls.osVersion.invalid && form.controls.osVersion.touched">
            OS Version is required
          </mat-error>
        </mat-form-field>
      </div>
    </div>

    <!-- Processor -->
    <div class="form-row">
      <label class="field-label">Processor <span class="required">*</span></label>
      <div class="field-control">
        <mat-form-field appearance="outline">
          <input matInput formControlName="processor">
          <mat-error *ngIf="form.controls.processor.invalid && form.controls.processor.touched">
            Processor is required
          </mat-error>
        </mat-form-field>
      </div>
    </div>

    <!-- RAM -->
    <div class="form-row">
      <label class="field-label">RAM <span class="required">*</span></label>
      <div class="field-control">
        <mat-form-field appearance="outline">
          <input matInput formControlName="ram">
          <mat-error *ngIf="form.controls.ram.invalid && form.controls.ram.touched">
            RAM is required
          </mat-error>
        </mat-form-field>
      </div>
    </div>

    <!-- Description -->
    <div class="form-row">
      <div class="label-with-action">
        <label class="field-label">
          Description <span class="required">*</span>
        </label>

        <button
          *ngIf="mode !== 'view'"
          mat-button
          type="button"
          class="ai-button"
          (click)="generateAiDescription()"
          [disabled]="!canGenerateAi()"
        >
          Generate AI Description
        </button>
      </div>

      <div class="field-control description-control">
        <mat-form-field appearance="outline">
          <textarea matInput rows="4" formControlName="description"></textarea>

          <mat-error *ngIf="form.controls.description.invalid && form.controls.description.touched">
            Description is required
          </mat-error>
        </mat-form-field>
      </div>
    </div>

  </div>

</mat-dialog-content>

<mat-dialog-actions align="end" class="dialog-actions">
  <button mat-button (click)="close()">Cancel</button>

  <button mat-raised-button color="primary"
          *ngIf="mode !== 'view'"
          (click)="submit()">
    Save
  </button>
</mat-dialog-actions>
