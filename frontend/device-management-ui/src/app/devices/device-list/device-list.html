<!-- Header -->
<header class="app-header">
  <div class="app-title">
    Device Management System
  </div>

  <div class="user-name">
    Logged in as: {{ getCurrentUserName() }}
  </div>

  <button mat-raised-button color="primary" class="log-out-button" (click)="logout()">
    LogOut
  </button>
</header>

<!-- Main Content -->
<div class="container">

  <!-- Card -->
  <mat-card class="main-card">

    <!-- Top Bar -->
    <div class="top-bar">

      <!-- Search (LEFT) -->
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Search devices</mat-label>

        <input
          matInput
          [(ngModel)]="searchQuery"
          (ngModelChange)="onSearchChange()"
          placeholder="Search by name, manufacturer, RAM..."
        />

        <!-- Clear (X) button INSIDE input -->
        <button
          *ngIf="searchQuery"
          matSuffix
          mat-icon-button
          type="button"
          aria-label="Clear"
          (click)="clearFilter()"
        >
          <mat-icon>close</mat-icon>
        </button>

      </mat-form-field>

      <!-- Add Button (RIGHT) -->
      <button mat-raised-button color="primary" class="add-button" (click)="openCreate()">
        + Add Device
      </button>

    </div>

    <!-- Table -->
    <div class="table-wrapper">
      <table mat-table [dataSource]="devices" class="mat-elevation-z2">

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let d">{{ d.name }}</td>
        </ng-container>

        <ng-container matColumnDef="manufacturer">
          <th mat-header-cell *matHeaderCellDef>Manufacturer</th>
          <td mat-cell *matCellDef="let d">{{ d.manufacturer }}</td>
        </ng-container>

        <ng-container matColumnDef="user">
          <th mat-header-cell *matHeaderCellDef>User</th>
          <td mat-cell *matCellDef="let d">
            <button
              mat-button
              (click)="handleUserClick(d)"
              [matTooltip]="getUserTooltip(d)"
              matTooltipPosition="above"
            >
              {{ getUserName(d) }}
            </button>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let d">

            <button mat-icon-button (click)="openView(d)">
              <mat-icon>visibility</mat-icon>
            </button>

            <button mat-icon-button color="primary" (click)="openEdit(d)">
              <mat-icon>edit</mat-icon>
            </button>

            <button mat-icon-button color="warn" (click)="delete(d)">
              <mat-icon>delete</mat-icon>
            </button>

          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      </table>
    </div>

  </mat-card>
</div>
